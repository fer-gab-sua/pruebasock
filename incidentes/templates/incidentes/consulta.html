<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Incidentes - Actualización en Tiempo Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2.5em;
        }
        
        .status-indicator {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fa;
        }
        
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        .status-connected {
            background: #28a745;
        }
        
        .status-disconnected {
            background: #dc3545;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .nav-links {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .nav-links a {
            display: inline-block;
            padding: 10px 20px;
            background: #764ba2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .nav-links a:hover {
            background: #667eea;
        }
        
        .incidentes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .incidente-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 6px solid #667eea;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeIn 0.5s;
        }
        
        .incidente-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .incidente-numero {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            word-wrap: break-word;
        }
        
        .incidente-estado {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 0.95em;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .estado-pendiente {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: #000;
            box-shadow: 0 2px 5px rgba(255, 193, 7, 0.3);
        }
        
        .estado-asignada {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            color: white;
            box-shadow: 0 2px 5px rgba(23, 162, 184, 0.3);
        }
        
        .estado-cerrada {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            box-shadow: 0 2px 5px rgba(40, 167, 69, 0.3);
        }
        
        .incidente-fecha {
            font-size: 0.85em;
            color: #888;
            line-height: 1.6;
        }
        
        .fecha-label {
            font-weight: 600;
            color: #666;
        }
        
        .no-incidentes {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 1.2em;
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Consulta de Incidentes en Tiempo Real</h1>
        
        <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
        </div>
        
        <div class="nav-links">
            <a href="{% url 'administracion' %}">Ir a Administración</a>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalIncidentes">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalPendientes">0</div>
                <div class="stat-label">Pendientes</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalAsignadas">0</div>
                <div class="stat-label">Asignadas</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalCerradas">0</div>
                <div class="stat-label">Cerradas</div>
            </div>
        </div>
        
        <div class="incidentes-grid" id="incidentesGrid">
            <!-- Los incidentes se cargarán aquí dinámicamente -->
        </div>
        
        <div class="no-incidentes" id="noIncidentes" style="display: none;">
            No hay incidentes registrados
        </div>
    </div>
    
    <script>
        let socket = null;
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/incidentes/`;
        
        function conectarWebSocket() {
            socket = new WebSocket(wsUrl);
            
            socket.onopen = function(e) {
                console.log('WebSocket conectado');
                actualizarEstadoConexion(true);
            };
            
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                console.log('Mensaje recibido:', data);
                
                if (data.type === 'initial_data' || data.type === 'update') {
                    actualizarIncidentes(data.incidentes);
                }
            };
            
            socket.onclose = function(event) {
                console.log('WebSocket desconectado');
                actualizarEstadoConexion(false);
                
                // Intentar reconectar después de 3 segundos
                setTimeout(conectarWebSocket, 3000);
            };
            
            socket.onerror = function(error) {
                console.error('Error en WebSocket:', error);
                actualizarEstadoConexion(false);
            };
        }
        
        function actualizarEstadoConexion(conectado) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (conectado) {
                statusDot.className = 'status-dot status-connected';
                statusText.textContent = 'Conectado - Actualizaciones en tiempo real activas';
            } else {
                statusDot.className = 'status-dot status-disconnected';
                statusText.textContent = 'Desconectado - Intentando reconectar...';
            }
        }
        
        function actualizarIncidentes(incidentes) {
            const grid = document.getElementById('incidentesGrid');
            const noIncidentes = document.getElementById('noIncidentes');
            
            // Actualizar estadísticas
            const total = incidentes.length;
            const pendientes = incidentes.filter(i => i.estado === 'pendiente').length;
            const asignadas = incidentes.filter(i => i.estado === 'asignada').length;
            const cerradas = incidentes.filter(i => i.estado === 'cerrada').length;
            
            document.getElementById('totalIncidentes').textContent = total;
            document.getElementById('totalPendientes').textContent = pendientes;
            document.getElementById('totalAsignadas').textContent = asignadas;
            document.getElementById('totalCerradas').textContent = cerradas;
            
            if (incidentes.length === 0) {
                grid.innerHTML = '';
                noIncidentes.style.display = 'block';
                return;
            }
            
            noIncidentes.style.display = 'none';
            grid.innerHTML = '';
            
            incidentes.forEach(incidente => {
                const card = crearCardIncidente(incidente);
                grid.appendChild(card);
            });
        }
        
        function crearCardIncidente(incidente) {
            const card = document.createElement('div');
            card.className = 'incidente-card';
            
            const estadoTexto = {
                'pendiente': 'Pendiente',
                'asignada': 'Asignada',
                'cerrada': 'Cerrada'
            };
            
            const fechaCreacion = new Date(incidente.fecha_creacion).toLocaleString('es-AR');
            const fechaActualizacion = new Date(incidente.fecha_actualizacion).toLocaleString('es-AR');
            
            card.innerHTML = `
                <div class="incidente-numero">${incidente.numero_incidente}</div>
                <div class="incidente-estado estado-${incidente.estado}">
                    ${estadoTexto[incidente.estado]}
                </div>
                <div class="incidente-fecha">
                    <div><span class="fecha-label">Creado:</span> ${fechaCreacion}</div>
                    <div><span class="fecha-label">Actualizado:</span> ${fechaActualizacion}</div>
                </div>
            `;
            
            return card;
        }
        
        // Iniciar conexión WebSocket al cargar la página
        conectarWebSocket();
    </script>
</body>
</html>
