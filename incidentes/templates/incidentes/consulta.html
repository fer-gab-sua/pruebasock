<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Incidentes - Actualización en Tiempo Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2.5em;
        }
        
        .status-indicator {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fa;
        }
        
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        .status-connected {
            background: #28a745;
        }
        
        .status-disconnected {
            background: #dc3545;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .nav-links {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .nav-links a {
            display: inline-block;
            padding: 10px 20px;
            background: #764ba2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .nav-links a:hover {
            background: #667eea;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
            font-size: 0.9em;
        }
        
        /* Estilos para vista Kanban */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        
        .kanban-column {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 500px;
        }
        
        .column-header {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1em;
            color: white;
            position: relative;
        }
        
        .column-header .count-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: white;
            color: #333;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .header-pendiente {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            box-shadow: 0 4px 10px rgba(255, 193, 7, 0.3);
        }
        
        .header-asignada {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            box-shadow: 0 4px 10px rgba(23, 162, 184, 0.3);
        }
        
        .header-cerrada {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }
        
        .kanban-cards {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .incidente-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: slideIn 0.4s ease-out;
            position: relative;
            cursor: pointer;
        }
        
        .incidente-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .incidente-card.changed {
            animation: highlightChange 1s ease-out;
        }
        
        @keyframes highlightChange {
            0% {
                background: #fff3cd;
                transform: scale(1.05);
            }
            100% {
                background: white;
                transform: scale(1);
            }
        }
        
        .change-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.4);
            animation: bounce 0.6s ease-out;
            z-index: 10;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .incidente-numero {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            word-wrap: break-word;
        }
        
        .incidente-fecha {
            font-size: 0.8em;
            color: #888;
            line-height: 1.6;
            margin-top: 10px;
        }
        
        .fecha-label {
            font-weight: 600;
            color: #666;
        }
        
        .no-incidentes {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 1.2em;
        }
        
        @media (max-width: 1024px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Consulta de Incidentes en Tiempo Real</h1>
        
        <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
        </div>
        
        <div class="nav-links">
            <a href="{% url 'administracion' %}">Ir a Administración</a>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalIncidentes">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalPendientes">0</div>
                <div class="stat-label">Pendientes</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalAsignadas">0</div>
                <div class="stat-label">Asignadas</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalCerradas">0</div>
                <div class="stat-label">Cerradas</div>
            </div>
        </div>
        
        <div class="kanban-board">
            <div class="kanban-column">
                <div class="column-header header-pendiente">
                    ⏳ PENDIENTE
                    <span class="count-badge" id="countPendientes">0</span>
                </div>
                <div class="kanban-cards" id="columnPendiente"></div>
            </div>
            
            <div class="kanban-column">
                <div class="column-header header-asignada">
                    🔧 ASIGNADA
                    <span class="count-badge" id="countAsignadas">0</span>
                </div>
                <div class="kanban-cards" id="columnAsignada"></div>
            </div>
            
            <div class="kanban-column">
                <div class="column-header header-cerrada">
                    ✅ CERRADA
                    <span class="count-badge" id="countCerradas">0</span>
                </div>
                <div class="kanban-cards" id="columnCerrada"></div>
            </div>
        </div>
        
        <div class="no-incidentes" id="noIncidentes" style="display: none;">
            No hay incidentes registrados
        </div>
    </div>
    
    <script>
        let socket = null;
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/incidentes/`;
        
        // Guardar el estado anterior de los incidentes para detectar cambios
        let estadosAnteriores = {};
        let timestampsCambios = {}; // Guardar cuándo ocurrió cada cambio
        
        // Cargar estados anteriores del localStorage
        try {
            const savedStates = localStorage.getItem('incidentesEstados');
            if (savedStates) {
                estadosAnteriores = JSON.parse(savedStates);
            }
            const savedTimestamps = localStorage.getItem('timestampsCambios');
            if (savedTimestamps) {
                timestampsCambios = JSON.parse(savedTimestamps);
            }
        } catch (e) {
            console.error('Error al cargar estados anteriores:', e);
        }
        
        function conectarWebSocket() {
            socket = new WebSocket(wsUrl);
            
            socket.onopen = function(e) {
                console.log('WebSocket conectado');
                actualizarEstadoConexion(true);
            };
            
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                console.log('Mensaje recibido:', data);
                
                if (data.type === 'initial_data' || data.type === 'update') {
                    actualizarIncidentes(data.incidentes);
                }
            };
            
            socket.onclose = function(event) {
                console.log('WebSocket desconectado');
                actualizarEstadoConexion(false);
                
                // Intentar reconectar después de 3 segundos
                setTimeout(conectarWebSocket, 3000);
            };
            
            socket.onerror = function(error) {
                console.error('Error en WebSocket:', error);
                actualizarEstadoConexion(false);
            };
        }
        
        function actualizarEstadoConexion(conectado) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (conectado) {
                statusDot.className = 'status-dot status-connected';
                statusText.textContent = 'Conectado - Actualizaciones en tiempo real activas';
            } else {
                statusDot.className = 'status-dot status-disconnected';
                statusText.textContent = 'Desconectado - Intentando reconectar...';
            }
        }
        
        function actualizarIncidentes(incidentes) {
            const noIncidentes = document.getElementById('noIncidentes');
            
            // Actualizar estadísticas
            const total = incidentes.length;
            const pendientes = incidentes.filter(i => i.estado === 'pendiente').length;
            const asignadas = incidentes.filter(i => i.estado === 'asignada').length;
            const cerradas = incidentes.filter(i => i.estado === 'cerrada').length;
            
            document.getElementById('totalIncidentes').textContent = total;
            document.getElementById('totalPendientes').textContent = pendientes;
            document.getElementById('totalAsignadas').textContent = asignadas;
            document.getElementById('totalCerradas').textContent = cerradas;
            
            // Actualizar contadores en las columnas
            document.getElementById('countPendientes').textContent = pendientes;
            document.getElementById('countAsignadas').textContent = asignadas;
            document.getElementById('countCerradas').textContent = cerradas;
            
            if (incidentes.length === 0) {
                limpiarColumnas();
                noIncidentes.style.display = 'block';
                return;
            }
            
            noIncidentes.style.display = 'none';
            
            // Limpiar columnas
            limpiarColumnas();
            
            // Detectar cambios y actualizar estados
            const nuevosEstados = {};
            const ahora = Date.now();
            
            incidentes.forEach(incidente => {
                const estadoAnterior = estadosAnteriores[incidente.numero_incidente];
                const cambioEstado = estadoAnterior && estadoAnterior !== incidente.estado;
                
                // Si hubo cambio de estado, guardar el timestamp
                if (cambioEstado) {
                    timestampsCambios[incidente.numero_incidente] = ahora;
                }
                
                // Guardar nuevo estado
                nuevosEstados[incidente.numero_incidente] = incidente.estado;
                
                // Verificar si el cambio fue reciente (últimos 30 segundos)
                const timestampCambio = timestampsCambios[incidente.numero_incidente];
                const cambioReciente = timestampCambio && (ahora - timestampCambio) < 30000; // 30 segundos
                
                const card = crearCardIncidente(incidente, cambioReciente);
                
                // Agregar a la columna correspondiente
                const columnId = `column${capitalize(incidente.estado)}`;
                const column = document.getElementById(columnId);
                if (column) {
                    column.appendChild(card);
                }
            });
            
            // Guardar estados actuales
            estadosAnteriores = nuevosEstados;
            
            // Limpiar timestamps antiguos (mayores a 30 segundos)
            const timestampsLimpios = {};
            Object.keys(timestampsCambios).forEach(key => {
                if ((ahora - timestampsCambios[key]) < 30000) {
                    timestampsLimpios[key] = timestampsCambios[key];
                }
            });
            timestampsCambios = timestampsLimpios;
            
            try {
                localStorage.setItem('incidentesEstados', JSON.stringify(nuevosEstados));
                localStorage.setItem('timestampsCambios', JSON.stringify(timestampsCambios));
            } catch (e) {
                console.error('Error al guardar estados:', e);
            }
        }
        
        function limpiarColumnas() {
            document.getElementById('columnPendiente').innerHTML = '';
            document.getElementById('columnAsignada').innerHTML = '';
            document.getElementById('columnCerrada').innerHTML = '';
        }
        
        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }
        
        function crearCardIncidente(incidente, cambioEstado = false) {
            const card = document.createElement('div');
            card.className = 'incidente-card';
            
            if (cambioEstado) {
                card.classList.add('changed');
            }
            
            const fechaCreacion = new Date(incidente.fecha_creacion).toLocaleString('es-AR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            const fechaActualizacion = new Date(incidente.fecha_actualizacion).toLocaleString('es-AR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            let badgeHtml = '';
            if (cambioEstado) {
                badgeHtml = '<div class="change-badge">CAMBIÓ ✨</div>';
            }
            
            card.innerHTML = `
                ${badgeHtml}
                <div class="incidente-numero">${incidente.numero_incidente}</div>
                <div class="incidente-fecha">
                    <div><span class="fecha-label">Creado:</span> ${fechaCreacion}</div>
                    <div><span class="fecha-label">Actualizado:</span> ${fechaActualizacion}</div>
                </div>
            `;
            
            return card;
        }
        
        // Iniciar conexión WebSocket al cargar la página
        conectarWebSocket();
    </script>
</body>
</html>
